name: FreeCloud Auto Checkin

on:
  schedule:
    # 每天北京时间 08:00 (UTC 00:00) 运行
    - cron: '0 0 * * *'
  workflow_dispatch: # 支持手动点击运行

jobs:
  checkin:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: pip install requests

      - name: Run Script
        env:
          FREECLOUD_USER: ${{ secrets.FREECLOUD_USER }}
          FREECLOUD_PASS: ${{ secrets.FREECLOUD_PASS }}
        run: python checkin.py
