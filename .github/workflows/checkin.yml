name: FreeCloud Playwright Checkin

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  checkin:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: |
          pip install playwright requests
          playwright install chromium --with-deps

      - name: Run Script
        env:
          FREECLOUD_USER: ${{ secrets.FREECLOUD_USER }}
          FREECLOUD_PASS: ${{ secrets.FREECLOUD_PASS }}
        run: python checkin.py
